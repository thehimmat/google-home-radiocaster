<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stream atTheBunga - Cast Receiver</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Crimson Pro', Georgia, serif;
      background: linear-gradient(135deg, #1a1614 0%, #2a2520 100%);
      color: #fef8e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 600px;
      text-align: center;
    }

    .logo {
      margin-bottom: 60px;
      opacity: 0.95;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.4));
    }

    .logo img {
      height: 80px;
      width: auto;
    }

    .now-playing {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid #d4cdc6;
      border-radius: 8px;
      padding: 40px;
      backdrop-filter: blur(10px);
      margin-bottom: 30px;
    }

    .artwork {
      margin-bottom: 30px;
    }

    .artwork img {
      width: 200px;
      height: 200px;
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      border: 1px solid #d4cdc6;
      object-fit: cover;
    }

    .metadata {
      margin-top: 30px;
    }

    .artist {
      font-size: 18px;
      color: #d4cdc6;
      font-weight: 500;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.9;
    }

    .title {
      font-size: 32px;
      font-weight: 600;
      color: #fef8e8;
      line-height: 1.3;
      margin-bottom: 20px;
    }

    .station-info {
      font-size: 14px;
      color: #a8a09a;
      letter-spacing: 0.5px;
    }

    .loading {
      margin-top: 50px;
    }

    .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 3px solid rgba(212, 205, 198, 0.3);
      border-top: 3px solid #d4cdc6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status-message {
      margin-top: 20px;
      font-size: 14px;
      color: #a8a09a;
      font-style: italic;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .container {
        padding: 20px;
      }

      .title {
        font-size: 24px;
      }

      .artwork img {
        width: 160px;
        height: 160px;
      }

      .now-playing {
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <!-- Relative paths so the page works from any origin it's served on -->
      <img src="/logos/atthebunga-logo-1A.png" alt="atTheBunga" style="height: 80px; width: auto; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));">
    </div>

    <div class="now-playing">
      <div class="artwork">
        <!-- Logo as default artwork (sender metadata can override with station art) -->
        <img id="artworkImage" src="/logos/atthebunga-logo-1A.png" alt="Album artwork" style="width: 200px; height: 200px; border-radius: 8px; border: 1px solid #d4cdc6; object-fit: contain; background: #2a2520; padding: 20px;">
      </div>

      <div class="metadata">
        <div class="artist" id="artist">Now Playing</div>
        <div class="title" id="title">Waiting for audio stream...</div>
        <div class="station-info" id="station">Stream atTheBunga</div>
      </div>

      <div class="loading" id="loading">
        <div class="spinner"></div>
        <div class="status-message" id="statusMessage">Connecting to stream...</div>
      </div>
    </div>
  </div>

  <!-- CAF receiver framework: cast-media-player owns playback (audio included);
       it stays hidden and the custom layout above is driven by PlayerDataBinder. -->
  <cast-media-player style="display: none;"></cast-media-player>
  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <script>
    const context = cast.framework.CastReceiverContext.getInstance();
    const playerData = {};
    const binder = new cast.framework.ui.PlayerDataBinder(playerData);

    // Senders differ: the CLI sends GENERIC metadata (title/subtitle), the web
    // player sends MusicTrack metadata (title/artist). Handle both.
    binder.addEventListener(cast.framework.ui.PlayerDataEventType.MEDIA_INFO_CHANGED, (e) => {
      const metadata = (e.value && e.value.metadata) || {};
      document.getElementById('title').textContent = metadata.title || 'Now Playing';
      document.getElementById('station').textContent =
        metadata.subtitle || metadata.artist || 'Stream atTheBunga';
      const image = metadata.images && metadata.images[0] && metadata.images[0].url;
      document.getElementById('artworkImage').src = image || '/logos/atthebunga-logo-1A.png';
    });

    binder.addEventListener(cast.framework.ui.PlayerDataEventType.STATE_CHANGED, (e) => {
      const playing = e.value === cast.framework.ui.State.PLAYING;
      document.getElementById('loading').style.display = playing ? 'none' : '';
      if (!playing) {
        document.getElementById('statusMessage').textContent =
          e.value === cast.framework.ui.State.IDLE ? 'Waiting for audio stream...' : 'Connecting to stream...';
      }
    });

    context.start();
  </script>
</body>
</html>
